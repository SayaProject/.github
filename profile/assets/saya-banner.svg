<svg width="1280" height="390" viewBox="0 0 1280 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SayaProject modern banner</title>
  <desc id="desc">A modern dark banner for SayaProject with smooth gradients, Telegram links, and GitHub support.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06070B"/>
      <stop offset="0.45" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#080A0F"/>
    </linearGradient>
    <linearGradient id="stroke" x1="74" y1="44" x2="1206" y2="346" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7F9" stop-opacity="0.95"/>
      <stop offset="0.46" stop-color="#A78BFA" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="word" x1="110" y1="112" x2="560" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#BDEFFF"/>
    </linearGradient>
    <filter id="softShadow" x="34" y="20" width="1212" height="350" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-60" y="-60" width="1400" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.82 0 0 0 0 0.95 0 0 0 0.28 0"/>
    </filter>
    <clipPath id="clip">
      <rect x="56" y="42" width="1168" height="306" rx="34"/>
    </clipPath>
  </defs>

  <rect width="1280" height="390" rx="30" fill="url(#bg)"/>
  <g filter="url(#glow)" opacity="0.7">
    <path d="M80 295 C206 232 304 334 448 276 C565 229 638 275 760 244 C870 216 933 142 1038 170 C1122 192 1169 263 1234 238" stroke="#22D3EE" stroke-width="7" fill="none"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="56" y="42" width="1168" height="306" rx="34" fill="#0D1117" fill-opacity="0.84"/>
    <rect x="57" y="43" width="1166" height="304" rx="33" stroke="url(#stroke)" stroke-opacity="0.74" stroke-width="2"/>
  </g>

  <g clip-path="url(#clip)">
    <path d="M82 130 C221 76 345 132 456 161 C598 198 659 61 792 92 C918 121 929 221 1053 171 C1137 137 1176 150 1230 185" stroke="#F8FAFC" stroke-opacity="0.09" stroke-width="4" fill="none"/>
    <path d="M64 290 C197 234 301 317 437 279 C572 242 620 309 753 267 C851 237 919 193 1033 215 C1121 232 1166 281 1229 249" stroke="#F8FAFC" stroke-opacity="0.12" stroke-width="4" fill="none"/>
    <path d="M876 75 C948 38 1038 63 1079 129 C1124 201 1093 294 1019 323 C945 351 867 314 835 239 C809 179 825 102 876 75Z" fill="#FFFFFF" fill-opacity="0.035" stroke="#E2E8F0" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M965 92 C1031 63 1117 90 1145 157 C1174 226 1131 302 1056 316" stroke="#A78BFA" stroke-opacity="0.26" stroke-width="3" fill="none"/>
  </g>

  <text x="112" y="168" fill="url(#word)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" letter-spacing="-1">SayaProject</text>
  <text x="116" y="212" fill="#B7C4D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">Telegram-first tools, APIs, bots, and support.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="116" y="251" width="222" height="44" rx="22" fill="#020617" fill-opacity="0.82" stroke="#2DD4BF" stroke-opacity="0.45"/>
    <circle cx="142" cy="273" r="6" fill="#2DD4BF"/>
    <text x="159" y="280" fill="#F8FAFC">t.me/SayaProject</text>

    <rect x="354" y="251" width="156" height="44" rx="22" fill="#020617" fill-opacity="0.82" stroke="#38BDF8" stroke-opacity="0.44"/>
    <circle cx="380" cy="273" r="6" fill="#38BDF8"/>
    <text x="397" y="280" fill="#F8FAFC">@Sayafq</text>

    <rect x="526" y="251" width="184" height="44" rx="22" fill="#020617" fill-opacity="0.82" stroke="#A78BFA" stroke-opacity="0.46"/>
    <circle cx="552" cy="273" r="6" fill="#A78BFA"/>
    <text x="569" y="280" fill="#F8FAFC">IFlexElite</text>
  </g>

  <g transform="translate(904 125)">
    <rect x="0" y="0" width="214" height="120" rx="32" fill="#020617" fill-opacity="0.55" stroke="#CBD5E1" stroke-opacity="0.16"/>
    <text x="48" y="76" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="900">S</text>
    <text x="104" y="70" fill="#8EA3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Project</text>
    <path d="M104 84 H174" stroke="#38BDF8" stroke-opacity="0.46" stroke-width="2"/>
  </g>
</svg>