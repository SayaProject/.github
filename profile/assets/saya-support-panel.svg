<svg width="610" height="210" viewBox="0 0 610 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SayaProject support panel</title>
  <desc id="desc">A modern dark panel showing SayaProject support links.</desc>
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="610" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="0.55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="608" height="208" rx="26" fill="#0D1117"/>
  <rect x="1" y="1" width="608" height="208" rx="26" stroke="url(#border)" stroke-opacity="0.55"/>
  <path d="M416 54 C472 20 545 46 568 102 C591 158 552 193 494 184 C435 175 382 138 392 93 C396 76 404 62 416 54Z" fill="#38BDF8" fill-opacity="0.08"/>
  <text x="32" y="50" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Support Routes</text>
  <text x="32" y="82" fill="#B7C4D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="500">Use the official links for updates, direct contact, and GitHub support.</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">
    <circle cx="44" cy="124" r="7" fill="#22D3EE"/>
    <text x="64" y="130" fill="#F8FAFC">t.me/SayaProject</text>
    <circle cx="44" cy="156" r="7" fill="#34D399"/>
    <text x="64" y="162" fill="#F8FAFC">@Sayafq</text>
    <circle cx="306" cy="124" r="7" fill="#A78BFA"/>
    <text x="326" y="130" fill="#F8FAFC">github.com/IFlexElite</text>
  </g>
</svg>